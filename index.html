<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c52222">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/daruma-wishes/icon-192.png">
  <title>小願望達摩帳</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #25201d;
      --muted: #706965;
      --paper: #fffaf0;
      --panel: #fffdf8;
      --line: #e8d7bd;
      --red: #c52222;
      --red-dark: #8e1717;
      --gold: #d8a73f;
      --green: #2f7d5b;
      --shadow: 0 18px 42px rgba(64, 34, 18, .13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 12%, rgba(216, 167, 63, .18), transparent 27rem),
        linear-gradient(135deg, #fff7e7 0%, #f8ead6 38%, #f5f8ef 100%);
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 0 22px;
      border-bottom: 1px solid rgba(142, 23, 23, .18);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .sync-status {
      margin: 8px 0 0;
      color: rgba(112, 105, 101, .82);
      font-size: .78rem;
    }

    .daruma-note {
      max-width: 420px;
      border-left: 3px solid var(--gold);
      padding: 2px 0 2px 12px;
      color: #5f534b;
      font-size: .78rem;
      line-height: 1.5;
    }

    .daruma-note strong {
      display: block;
      margin-bottom: 3px;
      color: var(--red-dark);
      font-size: .82rem;
    }

    .daruma-note ol {
      margin: 0;
      padding-left: 1.25em;
    }

    .daruma-note li {
      margin: 0;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(82px, 1fr));
      gap: 8px;
      min-width: min(100%, 310px);
    }

    .metric {
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, .76);
      padding: 9px 10px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(64, 34, 18, .08);
    }

    .metric strong {
      display: block;
      font-size: 1.3rem;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: .78rem;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(142, 23, 23, .28);
      border-radius: 8px;
      color: #fff;
      background: var(--red);
      box-shadow: 0 10px 20px rgba(142, 23, 23, .18);
      cursor: pointer;
      font-size: 1.45rem;
      line-height: 1;
    }

    .icon-button:hover {
      background: var(--red-dark);
    }

    .auth-button {
      min-height: 42px;
      border: 1px solid rgba(142, 23, 23, .28);
      border-radius: 8px;
      color: var(--red-dark);
      background: rgba(255, 253, 248, .82);
      cursor: pointer;
      font-weight: 700;
      padding: 0 14px;
      box-shadow: 0 10px 20px rgba(142, 23, 23, .08);
    }

    .auth-button:disabled {
      color: #9b8d80;
      background: #eadccb;
      cursor: not-allowed;
    }

    .auth-fields {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .auth-input {
      width: 150px;
      min-height: 42px;
      border: 1px solid #dec7a5;
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--ink);
      background: rgba(255, 250, 242, .9);
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216, 167, 63, .18);
    }

    .register-button {
      color: var(--muted);
      background: rgba(255, 248, 237, .85);
    }

    .wish-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .wish-section {
      margin-top: 24px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 4px;
      padding: 0 2px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 1.18rem;
      letter-spacing: 0;
    }

    .section-heading span {
      color: var(--muted);
      font-size: .9rem;
    }

    .wish-card {
      position: relative;
      display: grid;
      grid-template-rows: auto 16px auto auto;
      gap: 8px;
      min-height: 338px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, .9);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .wish-card.complete {
      border-color: #d8a73f;
      background: linear-gradient(180deg, rgba(255, 253, 248, .96), rgba(255, 248, 224, .96));
      box-shadow: 0 18px 42px rgba(120, 82, 17, .18), 0 0 0 2px rgba(216, 167, 63, .28);
    }

    .wish-number {
      align-self: center;
      justify-self: center;
      color: rgba(112, 105, 101, .82);
      font-size: .72rem;
      line-height: 1;
      letter-spacing: 0;
      pointer-events: none;
    }

    .daruma {
      position: relative;
      width: min(100%, 150px);
      aspect-ratio: 360 / 376;
      justify-self: center;
      display: block;
      margin: 0;
    }

    .daruma img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 10px 10px rgba(60, 24, 12, .12));
      user-select: none;
      pointer-events: none;
    }

    .daruma-color {
      position: absolute;
      inset: 0;
      display: block;
      background: var(--daruma-color, #cb1b45);
      /* Keep this blend-mode color layer: it preserves white/black artwork while applying Nippon Colors reliably on file:// pages. */
      mix-blend-mode: hue;
      opacity: .98;
      pointer-events: none;
    }

    .pupil {
      position: absolute;
      width: 7.4%;
      aspect-ratio: 1;
      top: 35.2%;
      left: 50%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 33%, rgba(255,255,255,.34) 0 9%, transparent 10%),
        #050505;
      opacity: 0;
      transform: translate(-50%, -50%) scale(.55);
      transition: opacity .18s ease, transform .18s ease;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .35);
    }

    .pupil.left {
      left: 36.4%;
    }

    .pupil.right {
      left: 63.3%;
    }

    .wish-card.active .pupil.left,
    .wish-card.complete .pupil.left,
    .wish-card.complete .pupil.right {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .wish-input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #dec7a5;
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fffaf2;
      outline: none;
    }

    .wish-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(216, 167, 63, .2);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .complete-button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--red);
      cursor: pointer;
      font-weight: 700;
    }

    .complete-button:disabled {
      color: #9b8d80;
      background: #eadccb;
      cursor: not-allowed;
    }

    .wish-card.complete .complete-button {
      background: var(--green);
    }

    .delete-button {
      width: 42px;
      height: 42px;
      border: 1px solid #e1cdb0;
      border-radius: 8px;
      color: var(--muted);
      background: #fff8ed;
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
    }

    .delete-button:hover {
      color: var(--red-dark);
      border-color: rgba(142, 23, 23, .4);
    }

    .wish-meta {
      position: absolute;
      left: 14px;
      bottom: 5px;
      max-width: calc(100% - 28px);
      color: rgba(112, 105, 101, .78);
      font-size: .63rem;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .empty-state {
      display: none;
      margin-top: 14px;
      padding: 42px 20px;
      border: 1px dashed #d6bea0;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 253, 248, .6);
    }

    .wish-grid:empty + .empty-state {
      display: block;
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .title-row {
        flex-direction: column;
        gap: 10px;
      }

      .daruma-note {
        max-width: none;
        font-size: .74rem;
      }

      .actions {
        justify-content: space-between;
      }

      .auth-fields {
        justify-content: flex-start;
        width: 100%;
      }

      .auth-input {
        width: min(100%, 180px);
      }

      .summary {
        min-width: 0;
        flex: 1;
      }

      .wish-grid {
        grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
        gap: 12px;
      }

      .wish-card {
        min-height: 304px;
        padding: 12px;
      }

      .wish-number {
        font-size: .66rem;
      }

      .wish-meta {
        left: 12px;
        max-width: calc(100% - 24px);
        font-size: .58rem;
      }

      .daruma {
        width: min(100%, 130px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <div class="title-row">
          <h1>小願望達摩帳</h1>
          <aside class="daruma-note" aria-label="開眼或擺放達摩禁忌">
            <strong>開眼或擺放達摩時的禁忌行為</strong>
            <ol>
              <li>在願望還沒實現前就畫上兩眼，會被認為是缺乏努力的象徵。</li>
              <li>只開一隻眼後放著不管：這代表忘記了自己的願望，被認為不吉利。</li>
              <li>願望實現前就丟棄：這表示半途而廢，違背了達摩「七轉八起（七転八起）」的精神，因此應避免。</li>
            </ol>
          </aside>
        </div>
        <p class="subtitle">一格一願，點睛完成。</p>
        <p class="sync-status" id="syncStatus">本機儲存</p>
      </div>
      <div class="actions">
        <div class="summary" aria-live="polite">
          <div class="metric">
            <strong id="totalCount">0</strong>
            <span>全部</span>
          </div>
          <div class="metric">
            <strong id="activeCount">0</strong>
            <span>未達成</span>
          </div>
          <div class="metric">
            <strong id="doneCount">0</strong>
            <span>完成</span>
          </div>
        </div>
        <div class="auth-fields" id="authFields">
          <input class="auth-input" id="authEmail" type="email" autocomplete="email" placeholder="Email" aria-label="Email">
          <input class="auth-input" id="authPassword" type="password" autocomplete="current-password" placeholder="密碼" aria-label="密碼">
          <button class="auth-button" id="authButton" type="button">登入</button>
          <button class="auth-button register-button" id="registerButton" type="button">註冊</button>
        </div>
        <button class="icon-button" id="addWish" type="button" title="新增願望" aria-label="新增願望">+</button>
      </div>
    </header>

    <section class="wish-section" aria-labelledby="openHeading">
      <div class="section-heading">
        <h2 id="openHeading">未達成區</h2>
        <span id="openSectionCount">0 格</span>
      </div>
      <div class="wish-grid" id="openGrid" aria-label="未達成願望列表"></div>
      <div class="empty-state">目前沒有未達成願望</div>
    </section>

    <section class="wish-section" aria-labelledby="doneHeading">
      <div class="section-heading">
        <h2 id="doneHeading">已達成區</h2>
        <span id="doneSectionCount">0 格</span>
      </div>
      <div class="wish-grid" id="doneGrid" aria-label="已達成願望列表"></div>
      <div class="empty-state">完成願望後會移到這裡</div>
    </section>
  </main>

  <template id="wishTemplate">
    <article class="wish-card">
      <figure class="daruma" aria-hidden="true">
        <img src="assets/daruma-wishes/daruma-cropped.png" alt="">
        <span class="daruma-color"></span>
        <span class="pupil left"></span>
        <span class="pupil right"></span>
      </figure>
      <div class="wish-number"></div>
      <input class="wish-input" type="text" maxlength="32" placeholder="願望名稱" aria-label="願望名稱">
      <div class="controls">
        <button class="complete-button" type="button">完成</button>
        <button class="delete-button" type="button" title="刪除" aria-label="刪除">×</button>
      </div>
      <div class="wish-meta"></div>
    </article>
  </template>

  <script src="assets/daruma-wishes/nippon-colors.js"></script>
  <script src="assets/daruma-wishes/firebase-config.js"></script>
  <script>
    const storageKey = "daruma-wishes-v1";
    const firebaseSdkVersion = "10.12.5";
    const fallbackDarumaColors = [
      { name: "赤", romanized: "AKA", value: "#CB1B45" },
      { name: "山吹", romanized: "YAMABUKI", value: "#F9BF45" },
      { name: "常磐", romanized: "TOKIWA", value: "#1B813E" },
      { name: "浅葱", romanized: "ASAGI", value: "#33A6B8" },
      { name: "菫", romanized: "SUMIRE", value: "#66327C" }
    ];
    const nipponColors = Array.isArray(window.NIPPON_COLORS) && window.NIPPON_COLORS.length
      ? window.NIPPON_COLORS
      : fallbackDarumaColors;
    const starterWishes = Array.from({ length: 8 }, () => ({
      id: crypto.randomUUID(),
      title: "",
      complete: false,
      colorIndex: randomColorIndex(),
      createdAt: todayIso(),
      completedAt: ""
    }));

    const openGrid = document.querySelector("#openGrid");
    const doneGrid = document.querySelector("#doneGrid");
    const template = document.querySelector("#wishTemplate");
    const addButton = document.querySelector("#addWish");
    const authFields = document.querySelector("#authFields");
    const authEmail = document.querySelector("#authEmail");
    const authPassword = document.querySelector("#authPassword");
    const authButton = document.querySelector("#authButton");
    const registerButton = document.querySelector("#registerButton");
    const totalCount = document.querySelector("#totalCount");
    const activeCount = document.querySelector("#activeCount");
    const doneCount = document.querySelector("#doneCount");
    const openSectionCount = document.querySelector("#openSectionCount");
    const doneSectionCount = document.querySelector("#doneSectionCount");
    const syncStatus = document.querySelector("#syncStatus");

    let wishes = loadWishes();
    let remoteDocRef = null;
    let remoteUnsubscribe = null;
    let firebaseAuth = null;
    let currentUser = null;
    let applyingRemote = false;
    let remoteSaveTimer = 0;

    function loadWishes() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return Array.isArray(saved) ? saved.map(normalizeWish) : starterWishes;
      } catch {
        return starterWishes;
      }
    }

    function normalizeWish(wish) {
      return {
        id: wish.id || crypto.randomUUID(),
        title: wish.title || "",
        complete: Boolean(wish.complete),
        colorIndex: Number.isInteger(wish.colorIndex) ? wish.colorIndex % nipponColors.length : randomColorIndex(),
        createdAt: wish.createdAt || todayIso(),
        completedAt: wish.completedAt || (wish.complete ? todayIso() : "")
      };
    }

    function randomColorIndex() {
      return Math.floor(Math.random() * nipponColors.length);
    }

    function todayIso() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDate(value) {
      return value ? value.replaceAll("-", "/") : "-";
    }

    function saveWishes() {
      localStorage.setItem(storageKey, JSON.stringify(wishes));
      queueRemoteSave();
    }

    function render() {
      openGrid.innerHTML = "";
      doneGrid.innerHTML = "";

      wishes.forEach((wish, index) => {
        const node = template.content.firstElementChild.cloneNode(true);
        const input = node.querySelector(".wish-input");
        const completeButton = node.querySelector(".complete-button");
        const deleteButton = node.querySelector(".delete-button");
        const number = node.querySelector(".wish-number");
        const meta = node.querySelector(".wish-meta");
        const daruma = node.querySelector(".daruma");
        const color = nipponColors[wish.colorIndex % nipponColors.length];

        input.value = wish.title;
        number.textContent = numberText(index);
        meta.textContent = metaText(wish);
        daruma.style.setProperty("--daruma-color", color.value);
        daruma.title = `${color.name} ${color.romanized}`;
        syncCard(node, wish, completeButton);

        input.addEventListener("input", () => {
          wish.title = input.value;
          if (!wish.title.trim()) {
            wish.complete = false;
            wish.completedAt = "";
            saveWishes();
            render();
            const currentInput = openGrid.querySelector(`[data-id="${wish.id}"] .wish-input`);
            currentInput?.focus();
            return;
          }
          saveWishes();
          syncCard(node, wish, completeButton);
          updateSummary();
        });

        completeButton.addEventListener("click", () => {
          if (!wish.title.trim()) return;
          wish.complete = !wish.complete;
          wish.completedAt = wish.complete ? todayIso() : "";
          saveWishes();
          render();
        });

        deleteButton.addEventListener("click", () => {
          wishes = wishes.filter((item) => item.id !== wish.id);
          saveWishes();
          render();
        });

        node.dataset.id = wish.id;
        const targetGrid = wish.complete && wish.title.trim() ? doneGrid : openGrid;
        targetGrid.append(node);
      });

      updateSummary();
    }

    function syncCard(node, wish, completeButton) {
      const hasTitle = Boolean(wish.title.trim());
      node.classList.toggle("active", hasTitle);
      node.classList.toggle("complete", Boolean(wish.complete && hasTitle));
      completeButton.disabled = !hasTitle;
      completeButton.textContent = wish.complete && hasTitle ? "已完成" : "完成";
    }

    function numberText(index) {
      return `#${String(index + 1).padStart(2, "0")}`;
    }

    function metaText(wish) {
      const created = formatDate(wish.createdAt);
      const completed = wish.complete && wish.completedAt ? formatDate(wish.completedAt) : "-";
      return `設立 ${created} / 完成 ${completed}`;
    }

    function updateSummary() {
      const named = wishes.filter((wish) => wish.title.trim());
      const done = named.filter((wish) => wish.complete);

      totalCount.textContent = wishes.length;
      activeCount.textContent = named.length - done.length;
      doneCount.textContent = done.length;
      openSectionCount.textContent = `${wishes.length - done.length} 格`;
      doneSectionCount.textContent = `${done.length} 格`;
    }

    addButton.addEventListener("click", () => {
      wishes.unshift({
        id: crypto.randomUUID(),
        title: "",
        complete: false,
        colorIndex: randomColorIndex(),
        createdAt: todayIso(),
        completedAt: ""
      });
      saveWishes();
      render();
      openGrid.querySelector(".wish-input")?.focus();
    });

    function queueRemoteSave() {
      if (!remoteDocRef || applyingRemote) return;
      window.clearTimeout(remoteSaveTimer);
      remoteSaveTimer = window.setTimeout(pushRemoteWishes, 450);
    }

    async function pushRemoteWishes() {
      if (!remoteDocRef || !currentUser) return;

      try {
        setSyncStatus("同步中...");
        await remoteDocRef.set({
          wishes,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        setSyncStatus(`Firebase 已同步：${currentUser.displayName || currentUser.email || "已登入"}`);
      } catch (error) {
        console.error(error);
        setSyncStatus("Firebase 同步失敗，本機已保存");
      }
    }

    async function initFirebaseSync() {
      const config = window.DARUMA_FIREBASE_CONFIG;
      if (!config || !config.apiKey || !config.projectId) {
        setSyncStatus("本機儲存；填入 Firebase 設定後可同步");
        authButton.disabled = true;
        return;
      }

      try {
        setSyncStatus("Firebase 可用，請先登入");
        await loadFirebaseSdk();
        const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(config);
        const db = firebase.firestore(app);
        firebaseAuth = firebase.auth(app);

        firebaseAuth.onAuthStateChanged((user) => {
          currentUser = user;
          if (user) {
            authButton.textContent = "登出";
            registerButton.hidden = true;
            authEmail.hidden = true;
            authPassword.hidden = true;
            connectRemoteDocument(db, config, user);
          } else {
            disconnectRemoteDocument();
            authButton.textContent = "登入";
            registerButton.hidden = false;
            authEmail.hidden = false;
            authPassword.hidden = false;
            setSyncStatus("請登入以讀取 Firebase 紀錄");
          }
        });
      } catch (error) {
        console.error(error);
        setSyncStatus("Firebase 載入失敗，本機模式");
      }
    }

    function loadFirebaseSdk() {
      if (window.firebase?.firestore && window.firebase?.auth) return Promise.resolve();

      return loadScript(`https://www.gstatic.com/firebasejs/${firebaseSdkVersion}/firebase-app-compat.js`)
        .then(() => loadScript(`https://www.gstatic.com/firebasejs/${firebaseSdkVersion}/firebase-auth-compat.js`))
        .then(() => loadScript(`https://www.gstatic.com/firebasejs/${firebaseSdkVersion}/firebase-firestore-compat.js`));
    }

    function connectRemoteDocument(db, config, user) {
      disconnectRemoteDocument();

      const collection = config.syncCollection || "darumaWishes";
      const docId = config.syncDocId || user.uid;
      remoteDocRef = db.collection(collection).doc(docId);
      setSyncStatus("讀取 Firebase 紀錄...");

      remoteUnsubscribe = remoteDocRef.onSnapshot((snapshot) => {
        const data = snapshot.data();
        if (!data || !Array.isArray(data.wishes)) {
          pushRemoteWishes();
          return;
        }

        applyingRemote = true;
        wishes = data.wishes.map(normalizeWish);
        localStorage.setItem(storageKey, JSON.stringify(wishes));
        render();
        applyingRemote = false;
        setSyncStatus(`Firebase 已同步：${user.displayName || user.email || "已登入"}`);
      }, (error) => {
        console.error(error);
        setSyncStatus("Firebase 讀取失敗，本機模式");
      });
    }

    function disconnectRemoteDocument() {
      if (remoteUnsubscribe) {
        remoteUnsubscribe();
        remoteUnsubscribe = null;
      }

      remoteDocRef = null;
      window.clearTimeout(remoteSaveTimer);
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          existing.addEventListener("load", resolve, { once: true });
          existing.addEventListener("error", reject, { once: true });
          return;
        }

        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.append(script);
      });
    }

    function setSyncStatus(message) {
      syncStatus.textContent = message;
    }

    function readAuthCredentials() {
      const email = authEmail.value.trim();
      const password = authPassword.value;

      if (!email || !password) {
        setSyncStatus("請輸入 Email 和密碼");
        return null;
      }

      if (password.length < 6) {
        setSyncStatus("密碼至少需要 6 個字元");
        return null;
      }

      return { email, password };
    }

    authButton.addEventListener("click", async () => {
      if (!firebaseAuth) return;

      try {
        if (currentUser) {
          await firebaseAuth.signOut();
          return;
        }

        setSyncStatus("登入中...");
        const credentials = readAuthCredentials();
        if (!credentials) return;
        await firebaseAuth.signInWithEmailAndPassword(credentials.email, credentials.password);
      } catch (error) {
        console.error(error);
        setSyncStatus("登入失敗，請確認 Email/密碼或 Firebase Auth 設定");
      }
    });

    registerButton.addEventListener("click", async () => {
      if (!firebaseAuth) return;

      try {
        setSyncStatus("註冊中...");
        const credentials = readAuthCredentials();
        if (!credentials) return;
        await firebaseAuth.createUserWithEmailAndPassword(credentials.email, credentials.password);
      } catch (error) {
        console.error(error);
        setSyncStatus("註冊失敗，請確認 Email/Password 已啟用");
      }
    });

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) return;
      if (location.protocol === "file:") {
        console.info("Service worker requires http://localhost or HTTPS.");
        return;
      }

      navigator.serviceWorker.register("service-worker.js").catch((error) => {
        console.error(error);
      });
    }

    render();
    initFirebaseSync();
    registerServiceWorker();
  </script>
</body>
</html>
